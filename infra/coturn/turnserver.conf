# ============================================================================
# VOXGRID COTURN CONFIGURATION
# ============================================================================
# Este arquivo é usado pelo Docker. O secret é passado via environment.
# ============================================================================

# Portas
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# IPs
listening-ip=0.0.0.0
# external-ip é detectado automaticamente ou passado via env

# Domínio
realm=voxgrid.voxbridge.app
server-name=voxgrid.voxbridge.app

# Autenticação (secret passado via command line)
use-auth-secret
# static-auth-secret é passado via --static-auth-secret

# Segurança
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Bloquear IPs privados
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Performance
total-quota=100
bps-capacity=0
stale-nonce=600
max-bps=0

# Portas de relay
min-port=49152
max-port=65535

# Logs
log-file=/var/log/turnserver.log
verbose

# TLS (descomente se tiver certificados)
# cert=/etc/letsencrypt/live/turn.voxbridge.app/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.voxbridge.app/privkey.pem
